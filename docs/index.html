<!DOCTYPE html>
<html class="light" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DJ JefBinomed Mixes - Sonic Minimalist</title>
        
        <!-- Tailwind CSS CDN -->
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        
        <!-- Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
        
        <!-- PWA Icons & Manifest -->
        <link rel="apple-touch-icon" sizes="192x192" href="./img/icons/icon-192x192.png" />
        <link rel="icon" type="image/png" sizes="48x48" href="./img/icons/icon-48x48.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon.ico" />
        <link rel="manifest" href="./img/site.webmanifest" />

        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        "colors": {
                            "tertiary-fixed-dim": "#81cfff",
                            "on-tertiary-container": "#004967",
                            "on-primary-container": "#613c00",
                            "secondary-fixed-dim": "#c8c6c5",
                            "on-secondary": "#ffffff",
                            "primary": "#845400",
                            "surface-container-low": "#f3f3f3",
                            "secondary": "#5f5e5e",
                            "on-primary-fixed": "#2a1800",
                            "on-primary": "#ffffff",
                            "surface-container-lowest": "#ffffff",
                            "on-secondary-fixed-variant": "#474746",
                            "surface-container": "#eeeeee",
                            "on-error-container": "#93000a",
                            "on-tertiary": "#ffffff",
                            "tertiary-fixed": "#c6e7ff",
                            "surface-container-highest": "#e2e2e2",
                            "inverse-surface": "#2f3131",
                            "inverse-on-surface": "#f1f1f1",
                            "primary-fixed": "#ffddb7",
                            "surface-variant": "#e2e2e2",
                            "on-surface-variant": "#524434",
                            "surface-tint": "#845400",
                            "on-primary-fixed-variant": "#643f00",
                            "tertiary-container": "#2cbdff",
                            "surface-dim": "#dadada",
                            "secondary-container": "#e2dfde",
                            "outline-variant": "#d8c3ae",
                            "on-surface": "#1a1c1c",
                            "on-error": "#ffffff",
                            "error-container": "#ffdad6",
                            "background": "#f9f9f9",
                            "inverse-primary": "#ffb95b",
                            "tertiary": "#00658d",
                            "secondary-fixed": "#e5e2e1",
                            "primary-fixed-dim": "#ffb95b",
                            "on-secondary-fixed": "#1c1b1b",
                            "error": "#ba1a1a",
                            "primary-container": "#f2a01d",
                            "surface-container-high": "#e8e8e8",
                            "on-secondary-container": "#636262",
                            "on-tertiary-fixed-variant": "#004c6b",
                            "outline": "#857462",
                            "surface-bright": "#f9f9f9",
                            "surface": "#f9f9f9",
                            "on-tertiary-fixed": "#001e2d",
                            "on-background": "#1a1c1c"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.5rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                        },
                        "spacing": {
                            "gutter": "16px",
                            "base": "4px",
                            "xl": "64px",
                            "sm": "16px",
                            "xs": "8px",
                            "margin-mobile": "16px",
                            "margin-desktop": "32px",
                            "lg": "40px",
                            "md": "24px"
                        },
                        "fontFamily": {
                            "label-sm": ["Plus Jakarta Sans"],
                            "headline-lg-mobile": ["Plus Jakarta Sans"],
                            "body-lg": ["Plus Jakarta Sans"],
                            "headline-md": ["Plus Jakarta Sans"],
                            "body-sm": ["Plus Jakarta Sans"],
                            "label-bold": ["Plus Jakarta Sans"],
                            "headline-lg": ["Plus Jakarta Sans"]
                        },
                        "fontSize": {
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                            "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                            "label-bold": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                        }
                    },
                },
            }
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
                vertical-align: middle;
            }
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: #f9f9f9;
            }
            ::-webkit-scrollbar-thumb {
                background: #dadada;
                border-radius: 10px;
            }
        </style>
    </head>
    <body class="bg-background text-on-surface font-body-lg overflow-hidden h-screen flex flex-col">
        <!-- Main Content Wrapper -->
        <main id="app-content" class="flex-1 flex flex-col overflow-y-auto pb-32">
            <!-- Header -->
            <header class="sticky top-0 z-40 bg-surface/80 backdrop-blur-md border-b border-outline-variant/10 shadow-sm flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 w-full">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">
                        <span class="text-on-primary-container font-black text-xl">JB</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-bold text-headline-md text-primary-container leading-none">JEF BINOMED</span>
                        <span class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-1">Premium House Mixes</span>
                    </div>
                </div>
            </header>

        <!-- Page Container (Dynamic Content) -->
            <div id="page-container" class="px-margin-mobile md:px-margin-desktop py-lg max-w-[1200px] mx-auto w-full focus:outline-none" tabindex="-1">
                <!-- Skeleton Loading -->
                <div class="flex flex-col gap-lg animate-pulse">
                    <div class="rounded-3xl bg-surface-container-high h-64 md:h-96 w-full"></div>
                    <div class="flex flex-col gap-4">
                        <div class="h-8 bg-surface-container-high rounded w-1/4"></div>
                        <div class="h-16 bg-surface-container-high rounded w-full"></div>
                        <div class="h-16 bg-surface-container-high rounded w-full"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Player Footer (Final) -->
        <footer id="global-player" role="complementary" aria-label="Lecteur Audio" class="fixed bottom-0 left-0 w-full z-[60] bg-surface-container-low/95 backdrop-blur-xl border-t border-outline-variant shadow-[0px_-10px_30px_rgba(0,0,0,0.05)] px-margin-mobile md:px-margin-desktop py-4">
            <div class="max-w-[1200px] mx-auto flex flex-col gap-3">
                <!-- Progress Bar -->
                <div class="flex flex-col items-center gap-1 w-full">
                    <div class="flex justify-between w-full text-[10px] text-secondary font-bold mb-1">
                        <span id="player-timer" aria-live="polite">0:00</span>
                        <span id="player-duration">0:00</span>
                    </div>
                    <div id="player-progress-container" role="slider" aria-label="Progression du mix" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" class="w-full h-1 bg-outline-variant rounded-full relative overflow-hidden cursor-pointer group">
                        <div id="player-progress-bar" class="absolute left-0 top-0 h-full w-[0%] bg-primary rounded-full transition-all duration-100"></div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <!-- Now Playing Meta -->
                    <div class="flex items-center gap-sm flex-1 min-w-0">
                        <div class="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0 bg-primary-fixed shadow-md">
                            <img id="player-album-art" alt="Pochette du mix" class="w-full h-full object-cover" src="./img/binomed_sun_flower.png"/>
                        </div>
                        <div class="flex flex-col min-w-0">
                            <span id="player-track-title" class="font-label-bold text-label-bold text-on-surface truncate">En attente...</span>
                            <span class="font-label-sm text-label-sm text-secondary uppercase tracking-tighter">Mix Series</span>
                        </div>
                    </div>

                    <!-- Player Controls -->
                    <div class="flex items-center gap-6 md:gap-8 flex-none px-4">
                        <button id="player-prev" class="text-on-surface-variant hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-full" aria-label="Mix précédent">
                            <span class="material-symbols-outlined text-2xl">skip_previous</span>
                        </button>
                        <button id="player-play-pause" class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center active:scale-95 transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-primary" aria-label="Lecture / Pause">
                            <span id="player-play-icon" class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">play_circle</span>
                        </button>
                        <button id="player-next" class="text-on-surface-variant hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-full" aria-label="Mix suivant">
                            <span class="material-symbols-outlined text-2xl">skip_next</span>
                        </button>
                    </div>

                    <!-- Volume & Extras -->
                    <div class="hidden md:flex items-center justify-end gap-6 flex-1">
                        <div class="flex items-center gap-2 border-l border-outline-variant pl-6">
                            <span id="player-volume-icon" class="material-symbols-outlined text-on-surface-variant text-xl">volume_up</span>
                            <div id="player-volume-container" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="70" class="w-20 h-1 bg-outline-variant rounded-full overflow-hidden cursor-pointer">
                                <div id="player-volume-bar" class="h-full w-[70%] bg-primary rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>

        <!-- Scripts -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
        <script src="./playlist.js"></script>
        <script src="./js/player.js"></script>
        <script src="./js/app.js"></script>
    </body>
</html>
